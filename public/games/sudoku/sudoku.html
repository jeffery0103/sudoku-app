<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>數獨 Sudoku</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
  <div id="lottery-modal-overlay" class="hidden">
    <div id="lottery-machine">
    <h3>特殊模式挑戰</h3>
    <div class="reels-container">
        <div class="reel-container"><div class="reel reel-1"></div></div>
        <div class="reel-container"><div class="reel reel-2"></div></div>
        <div class="reel-container"><div class="reel reel-3"></div></div>
    </div>
    <button id="lottery-lever">
        <span class="lever-arm"></span>
        <span class="lever-handle"></span>
    </button>
    <p id="lottery-result-text"></p>
</div>
</div>

  <div id="sudoku-mode-modal-overlay" class="hidden">
    <div id="sudoku-mode-modal">
      <h3>請選擇數獨遊戲模式</h3>
      <div id="sudoku-mode-buttons">
        <button id="sudoku-single-player-btn" class="mode-select-btn" data-mode="single">
          <h4>單人挑戰</h4>
          <span>經典玩法，挑戰自我</span>
        </button>
        <button id="sudoku-multi-player-btn" class="mode-select-btn" data-mode="multiplayer">
          <h4>多人競速</h4>
          <span>與朋友來一場腦力對決</span>
        </button>
      </div>
    </div>
  </div>

  <div id="multiplayer-join-modal-overlay" class="hidden">
    <div id="multiplayer-join-modal">
      <h3>多人連線</h3>
      <div class="join-room-section">
        <input type="text" id="room-id-input" placeholder="輸入房號" maxlength="6" />
        <button id="join-room-btn">進入</button>
      </div>
      <hr>
      <div class="create-room-section">
        <button id="create-multiplayer-room-btn">創建新房間</button>
      </div>
      <button id="cancel-multiplayer-btn">返回</button>
    </div>
  </div>

  <div id="difficulty-modal-overlay" class="hidden">
    <div id="difficulty-modal">
      <h3>請選擇遊戲難度</h3>
      <p>難度將會影響題目的複雜度與輔助功能的啟用狀態。</p>
      <div id="difficulty-buttons">
        <button class="difficulty-btn" data-difficulty="easy">
          <h4>簡單</h4>
          <span>輔助功能全開，適合新手(35洞)</span>
        </button>
        <button class="difficulty-btn" data-difficulty="medium">
          <h4>中等</h4>
          <span>保留部分輔助，適合進階(45洞)</span>
        </button>
        <button class="difficulty-btn" data-difficulty="hard">
          <h4>困難</h4>
          <span>無進階輔助，純粹挑戰自己(55洞)</span>
        </button>
        <button class="difficulty-btn" data-difficulty="custom">
          <h4>自訂</h4>
          <span>拖曳滑桿，自由決定空格數(30 ~ 57+)</span>
        </button>
      </div>
    </div>
  </div>

  <div id="custom-modal-overlay" class="hidden">
    <div id="custom-modal">
      <h3 id="modal-title">需要您的確認</h3>
      <p id="modal-message"></p>
      <div id="modal-buttons">
        <button id="modal-confirm-btn">確定</button>
        <button id="modal-cancel-btn">取消</button>
      </div>
    </div>
  </div>

  <div id="alert-modal-overlay" class="hidden">
    <div id="alert-modal">
      <h3 id="alert-title">通知</h3> <p id="alert-message"></p>
      <button id="alert-ok-btn">確定</button>
    </div>
  </div>

  <div id="win-modal-overlay" class="hidden">
    <div id="win-modal">
      <h2 id="win-modal-title">恭喜通關！</h2>
      <p id="win-modal-subtitle">您已成功完成數獨挑戰！</p>

      <div id="win-stats-container">
        </div>
      
      <button id="win-modal-new-game-btn">再來一局</button>
      <button id="win-modal-exit-room-btn" class="hidden">退出房間</button>
      <button id="win-modal-extreme-challenge-btn" class="menu-button extreme-challenge hidden">
        繼續觀戰 👀
      </button>
    </div>
  </div>

  <div id="game-menu-modal-overlay" class="hidden">
    <div id="game-menu-modal">
      <h3>遊戲選單</h3>
      <div class="game-menu-buttons">
        <button id="menu-restart-btn">重新開始本局</button>
        <button id="menu-new-game-btn">開啟新的一局</button>
        
        <button id="menu-resume-btn">繼續遊戲</button>
      </div>
    </div>
  </div>

  <div id="app-container" class="app-container hidden">
    <div class="main-container">

      <div class="game-wrapper">
        <div class="game-main-content">
          <div class="title-container">
            <h1>數獨 Sudoku</h1>
            <div id="player-name-display">
              </div>
            <div id="timer-container">
              <span class="timer-label">用時：</span>
              <span id="timer-value">00:00:00</span>
            </div>
          </div>

          <div id="game-board" class="hidden"></div>

          <div id="waiting-view">
              <div class="waiting-text-container">
                  <p id="waiting-main-text"></p>
                  <p id="waiting-sub-text">等待其他玩家加入...</p>
              </div>
              <button id="sudoku-start-game-btn" class="hidden">開始遊戲</button>
          </div>
          
          <div id="sudoku-join-requests-area" class="hidden">
              <h3>加入請求</h3>
              <ul id="sudoku-join-requests-list">
                  </ul>
          </div>
        </div>
      </div>

      <div class="controls-wrapper">
        <div id="player-name-display-corner"></div>

        <div id="in-game-controls" class="hidden">
            <div class="upper-controls">
              <div id="quadrant-numbers" class="control-quadrant">
                <h3>數字鍵盤</h3>
                <div id="number-palette"></div>
              </div>
              
              <div id="game-info-panel" class="control-quadrant">
  
                <div id="single-player-info" class="hidden">
                  <h3>遊戲資訊</h3>
                  <div class="info-item progress-bar-container">
                    <span>完成進度:</span>
                    <div class="progress-bar"><div id="progress-bar-fill"></div></div>
                    <span id="progress-percentage">0%</span>
                  </div>
                  <div class="info-item"><span>剩餘提示:</span><span id="info-hint-count">0</span></div>
                  <div class="info-item"><span>剩餘檢查:</span><span id="info-validate-count">0</span></div>
                  <hr>
                  <div class="info-item-column"><h4>當前難度</h4><p id="difficulty-display">-</p></div>
                  <div class="info-item-column"><h4>輔助功能</h4><p id="helpers-display">-</p></div>
                </div>
              
                <div id="multiplayer-info" class="hidden">
                  <div class="in-game-tabs-container">
                    <button class="in-game-tab-button active" data-tab="ingame-progress">進度排行</button>
                    <button class="in-game-tab-button" data-tab="ingame-chat">
                        聊天室
                      <span id="ingame-chat-notification-badge" class="hidden"></span>
                    </button>
                    <button class="in-game-tab-button" data-tab="ingame-info">遊戲資訊</button>
                  </div>
                  
                  <div class="in-game-tab-content-wrapper">
                    <div id="tab-content-ingame-progress" class="in-game-tab-content active">
                      <div id="opponent-progress-container">
                        </div>
                    </div>
              
                    <div id="tab-content-ingame-chat" class="in-game-tab-content">
                      <div id="in-game-chat-container">
                        <div class="in-game-chat-messages">
                          </div>
                        <div class="in-game-chat-input">
                          <input type="text" placeholder="輸入訊息..." maxlength="40" />
                          <button>傳送</button>
                        </div>
                      </div>
                    </div>
                    <div id="tab-content-ingame-info" class="in-game-tab-content">
                        <div id="multiplayer-game-info-content" class="game-info-content">
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          <div class="lower-controls">
            <label class="switch-control" for="pencil-toggle-checkbox"><span class="switch-label">筆記模式</span><input type="checkbox" id="pencil-toggle-checkbox" /><span class="slider round"></span></label>
            <button id="validate-btn">檢查</button>
            <button id="hint-btn">提示</button>
            <label class="switch-control" for="highlight-helper-checkbox"><span class="switch-label">高亮輔助</span><input type="checkbox" id="highlight-helper-checkbox" /><span class="slider round"></span></label>
            <button id="pause-btn">暫停</button>
            <button id="game-menu-btn">遊戲選單</button>
          </div>
        </div>

        <div id="multiplayer-waiting-panel" class="hidden">
            <div class="tabs-container">
              <button class="tab-button active" data-tab="lobby-player-list">玩家列表</button>
              <button class="tab-button" data-tab="lobby-chat">
                聊天室
                <span id="chat-notification-badge" class="hidden"></span>
              </button>
            </div>
            <div class="tab-content active" id="tab-content-lobby-player-list">
              <div class="player-list-container">
                  </div>
            </div>
            <div class="tab-content" id="tab-content-lobby-chat">
              <div class="chat-messages"></div>
              <div class="chat-input-container">
                <input type="text" placeholder="輸入訊息...">
                <button>傳送</button>
              </div>
            </div>
        </div>

        <div id="solution-view" class="hidden">
          <h3>完整解答</h3>
          <div id="solution-board"></div>
          <div class="solution-buttons">
            <button id="solution-new-game-btn">開啟新的一局</button>
          </div>
        </div>
        
      </div> 
    </div> 
  </div> 
  <div id="custom-difficulty-modal-overlay" class="hidden">
    <div class="custom-modal-content">
        <h2>自訂謎題難度</h2>
        <div class="slider-section">
            <label>
                自訂空格數: <span id="holes-value-display">45</span> 洞
                <span class="diff-text-wrapper">(<span id="holes-diff-text">中等</span>)</span>
            </label>
            <input type="range" id="custom-holes-slider" min="30" max="57" value="45">
        </div>
        <div class="custom-modal-actions">
            <button id="cancel-custom-diff-btn">取消</button>
            <button id="confirm-custom-diff-btn">確認</button>
        </div>
    </div>
</div>

<div id="mobile-floating-chat-btn" style="display: none; touch-action: none;">
    💬
    <span id="mobile-chat-badge" class="hidden">0</span>
  </div>

  <script>
    // 使用 DOMContentLoaded 確保第一時間執行，不被其他資源卡住
    document.addEventListener('DOMContentLoaded', () => {
        const phase1 = document.getElementById('splash-phase-1');
        const phase2 = document.getElementById('splash-phase-2');
        const phase3 = document.getElementById('splash-phase-3');
        const grid = document.getElementById('splash-grid');
        const pen = document.getElementById('splash-pen');
        const progressBar = document.getElementById('splash-progress');
        const splashScreen = document.getElementById('splash-screen');

        if (!splashScreen) return;

        // ==== 🎬 完美時間軸序列 ====
        // 1. 停留 1 秒後，隱藏標題，顯示作者
        setTimeout(() => {
            phase1.style.opacity = '0';
            phase1.style.transform = 'translateY(-10px)';

            setTimeout(() => {
                phase2.style.opacity = '1';
                phase2.style.transform = 'translateY(0)';

                // 2. 停留 1.2 秒後，隱藏作者，顯示棋盤
                setTimeout(() => {
                    phase2.style.opacity = '0';
                    phase2.style.transform = 'translateY(-10px)';

                    setTimeout(() => {
                        phase3.style.opacity = '1';
                        phase3.style.transform = 'scale(1)';

                        // 3. 呼叫畫圖演算法
                        startGridAnimation();

                    }, 500); // 等待作者淡出
                }, 1200); // 作者顯示時間
            }, 500); // 等待標題淡出
        }, 1000); // 標題顯示時間

        function startGridAnimation() {
            // 瞬間生成合法盤面
            function generateRandomBoard() {
                const board = Array.from({ length: 9 }, () => Array(9).fill(0));
                function isValid(r, c, k) {
                    for (let i = 0; i < 9; i++) {
                        const m = 3 * Math.floor(r / 3) + Math.floor(i / 3);
                        const n = 3 * Math.floor(c / 3) + (i % 3);
                        if (board[r][i] === k || board[i][c] === k || board[m][n] === k) return false;
                    }
                    return true;
                }
                function solve() {
                    for (let r = 0; r < 9; r++) {
                        for (let c = 0; c < 9; c++) {
                            if (board[r][c] === 0) {
                                const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                                for (let k of nums) {
                                    if (isValid(r, c, k)) { board[r][c] = k; if (solve()) return true; board[r][c] = 0; }
                                }
                                return false;
                            }
                        }
                    }
                    return true;
                }
                solve(); return board;
            }

            const authenticBoard = generateRandomBoard();

            // 填入格子
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'splash-cell';
                    cell.id = `splash-cell-${r * 9 + c}`;
                    cell.textContent = authenticBoard[r][c];
                    grid.appendChild(cell);
                }
            }

            const writingPath = [
                [0,0], [0,1], [1,1], [1,2], [0,2], [0,3], [0,4], [1,4], [2,4],
                [2,5], [1,5], [0,5], [0,6], [0,7], [1,7], [2,7], [2,6], [3,6],
                [4,6], [4,7], [5,7], [6,7], [6,8], [5,8], [4,8], [3,8], [2,8],
                [1,8], [0,8], [1,0], [2,0], [2,1], [3,1], [3,0], [4,0], [5,0],
                [5,1], [6,1], [6,0], [7,0], [8,0], [8,1], [7,1], [7,2], [8,2],
                [8,3], [7,3], [7,4], [8,4], [8,5], [7,5], [7,6], [8,6], [8,7],
                [7,7], [7,8], [8,8]
            ];

            let currentIndex = 0;
            const totalSteps = writingPath.length;

            function writeNextCell() {
                if (currentIndex < totalSteps) {
                    const [row, col] = writingPath[currentIndex];
                    // 計算精準定位
                    const targetX = col * (100 / 9) + (100 / 18);
                    const targetY = row * (100 / 9) + (100 / 18);

                    pen.style.left = `${targetX}%`;
                    pen.style.top = `${targetY}%`;

                    const targetCell = document.getElementById(`splash-cell-${row * 9 + col}`);
                    if (targetCell) targetCell.classList.add('written');

                    progressBar.style.width = `${((currentIndex + 1) / totalSteps) * 100}%`;
                    currentIndex++;

                    setTimeout(writeNextCell, 80); // 書寫速度
                } else {
                    progressBar.style.width = '100%';
                    // 寫完後等待 0.5 秒再退場
                    setTimeout(() => {
                        splashScreen.style.opacity = '0';
                        setTimeout(() => {
                            splashScreen.style.display = 'none';
                            
                            // 📢 【核心關鍵】廣播：動畫播完了！可以問名字了！
                            window.dispatchEvent(new Event('splashComplete'));
                            
                        }, 500);
                    }, 500);
                }
            }
            // 延遲 0.3 秒再開始寫字
            setTimeout(writeNextCell, 300);
        }
    });
  </script>

</body>

<div id="splash-screen">
    <h1 class="splash-text" id="splash-phase-1">數獨 Sudoku</h1>
    <h2 class="splash-text" id="splash-phase-2" style="opacity: 0; transform: translateY(10px);">Made by Jeffery Studio, NCU</h2>
    
    <div id="splash-phase-3" class="splash-animation-container" style="opacity: 0; transform: scale(0.9);">
      <div class="splash-grid" id="splash-grid"></div>
      <div class="splash-pen" id="splash-pen">✏️</div>
      <div class="splash-progress-container">
        <div class="splash-progress-bar" id="splash-progress"></div>
      </div>
    </div>
  </div>

</html>

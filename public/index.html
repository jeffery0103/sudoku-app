<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>數獨 Sudoku</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="prefetch" href="/games/sudoku/sudoku.html" as="fetch">
    <link rel="prefetch" href="/games/sudoku/sudoku.css" as="style">
    <link rel="prefetch" href="/games/sudoku/sudoku.js" as="script">
  </head>
  <body>

    <div id="splash-screen">
        <h1 class="splash-text" id="splash-phase-1">數獨 Sudoku</h1>
        <h2 class="splash-text" id="splash-phase-2" style="opacity: 0; transform: translateY(10px);">Made by Jeffery Studio, NCU</h2>
        
        <div id="splash-phase-3" class="splash-animation-container" style="opacity: 0; transform: scale(0.9);">
            <div class="splash-grid" id="splash-grid"></div>
            <div class="splash-pen" id="splash-pen">✏️</div>
            <div class="splash-progress-container">
                <div class="splash-progress-bar" id="splash-progress"></div>
                <span class="splash-progress-text" id="splash-progress-text">0%</span>
            </div>
        </div>
    </div>

    <div class="container" id="app-container">
      <div id="player-info-display" class="hidden">
        
      </div>
      
      <div id="login-screen" class="hidden"> 
        <h1>歡迎來到數獨遊戲</h1>
        <div id="player-setup-area">
          <h2>請設定您的玩家名稱</h2>
          <input
            type="text"
            id="player-name-input"
            placeholder="輸入名稱後按下 Enter 或點擊按鈕"
            maxlength="12"
          />
          <button id="confirm-name-button">確認名稱</button>
        </div>
      </div>

      <div id="main-app-screen" class="hidden">
        <div id="game-container">
          </div>
      </div>
    </div>

    <div id="custom-modal-overlay" class="hidden">
      <div id="custom-modal">
        <h3 id="modal-title">需要您的確認</h3>
        <p id="modal-message"></p>
        <div id="modal-buttons">
          <button id="modal-confirm-btn">確認</button>
          <button id="modal-cancel-btn">取消</button>
        </div>
      </div>
    </div>

    <div id="alert-modal-overlay" class="hidden">
      <div id="alert-modal">
        <h3 id="alert-title">提示</h3>
        <p id="alert-message"></p>
        <button id="alert-ok-btn">確定</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const phase1 = document.getElementById('splash-phase-1');
            const phase2 = document.getElementById('splash-phase-2');
            const phase3 = document.getElementById('splash-phase-3');
            const grid = document.getElementById('splash-grid');
            const pen = document.getElementById('splash-pen');
            const progressBar = document.getElementById('splash-progress');
            const splashScreen = document.getElementById('splash-screen');
            const loginScreen = document.getElementById('login-screen');

            if (!splashScreen) return;

            // 🎬 1. 序列動畫啟動：放慢節奏版！
            setTimeout(() => {
                phase1.style.opacity = '0';
                phase1.style.transform = 'translateY(-10px)';

                setTimeout(() => {
                    phase2.style.opacity = '1';
                    phase2.style.transform = 'translateY(0)';

                    // ✨ 作者名稱停留久一點 (從 1200 改為 2000)
                    setTimeout(() => {
                        phase2.style.opacity = '0';
                        phase2.style.transform = 'translateY(-10px)';

                        // ✨ 棋盤浮現的過渡期稍微拉長 (從 500 改為 800)
                        setTimeout(() => {
                            phase3.style.opacity = '1';
                            phase3.style.transform = 'scale(1)';
                            startGridAnimation(); // 啟動棋盤生成與筆尖飛舞
                        }, 800);
                    }, 2000);
                }, 800);
            }, 1500); // ✨ 一開始的標題也多停留一下 (從 1000 改為 1500)

            function startGridAnimation() {
                // 3. 瞬間生成合法盤面
                function generateRandomBoard() {
                    const board = Array.from({ length: 9 }, () => Array(9).fill(0));
                    function isValid(r, c, k) {
                        for (let i = 0; i < 9; i++) {
                            const m = 3 * Math.floor(r / 3) + Math.floor(i / 3);
                            const n = 3 * Math.floor(c / 3) + (i % 3);
                            if (board[r][i] === k || board[i][c] === k || board[m][n] === k) return false;
                        }
                        return true;
                    }
                    function solve() {
                        for (let r = 0; r < 9; r++) {
                            for (let c = 0; c < 9; c++) {
                                if (board[r][c] === 0) {
                                    const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                                    for (let k of nums) {
                                        if (isValid(r, c, k)) { board[r][c] = k; if (solve()) return true; board[r][c] = 0; }
                                    }
                                    return false;
                                }
                            }
                        }
                        return true;
                    }
                    solve(); return board;
                }

                const authenticBoard = generateRandomBoard();

                // 4. 填入格子結構
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'splash-cell';
                        cell.id = `splash-cell-${r * 9 + c}`;
                        cell.textContent = authenticBoard[r][c];
                        grid.appendChild(cell);
                    }
                }

                // 5. 筆尖飛舞路徑 (連貫一筆畫)
                function generateContinuousPath() {
                    const allPaths = [];
                    let p1 = [];
                    for (let r = 0; r < 9; r++) {
                        for (let c = 0; c < 9; c++) {
                            p1.push([r, r % 2 === 0 ? c : 8 - c]);
                        }
                    }
                    allPaths.push(p1);

                    let p2 = [];
                    for (let c = 0; c < 9; c++) {
                        for (let r = 0; r < 9; r++) {
                            p2.push([c % 2 === 0 ? r : 8 - r, c]);
                        }
                    }
                    allPaths.push(p2);

                    let p3 = [];
                    for(let c=0; c<9; c++) { 
                        if(c%2===0) p3.push([0,c], [1,c], [2,c]);
                        else p3.push([2,c], [1,c], [0,c]);
                    }
                    for(let c=8; c>=0; c--) { 
                        if(c%2===0) p3.push([3,c], [4,c], [5,c]);
                        else p3.push([5,c], [4,c], [3,c]);
                    }
                    for(let c=0; c<9; c++) { 
                        if(c%2===0) p3.push([6,c], [7,c], [8,c]);
                        else p3.push([8,c], [7,c], [6,c]);
                    }
                    allPaths.push(p3);

                    let selectedPath = allPaths[Math.floor(Math.random() * allPaths.length)];
                    if (Math.random() > 0.5) {
                        selectedPath = selectedPath.map(pos => [pos[1], pos[0]]);
                    }
                    return selectedPath;
                }

                const writingPath = generateContinuousPath();
                let currentIndex = 0;
                const totalSteps = writingPath.length;

                // 進度條「隨機跳動」的獨立機制
                let currentProgress = 0;
                function simulateRandomLoading() {
                    if (currentProgress < 95) { 
                        let jump = Math.floor(Math.random() * 8) + 2; // ✨ 配合動畫變慢，進度條每次跳動的幅度也改小一點
                        currentProgress += jump;
                        if (currentProgress > 95) currentProgress = 95;
                        
                        progressBar.style.width = `${currentProgress}%`;
                        const progressText = document.getElementById('splash-progress-text');
                        if (progressText) progressText.textContent = `${currentProgress}%`;

                        let nextTick = Math.floor(Math.random() * 250) + 150; // ✨ 跳動間隔也拉長一點
                        setTimeout(simulateRandomLoading, nextTick);
                    }
                }
                
                simulateRandomLoading();

                function writeNextCell() {
                    if (currentIndex < totalSteps) {
                        const [row, col] = writingPath[currentIndex];
                        const targetX = col * (100 / 9) + (100 / 18);
                        const targetY = row * (100 / 9) + (100 / 18);

                        pen.style.left = `${targetX}%`;
                        pen.style.top = `${targetY}%`;

                        const targetCell = document.getElementById(`splash-cell-${row * 9 + col}`);
                        if (targetCell) targetCell.classList.add('written');

                        currentIndex++;
                        
                        // ✨ 這裡就是控制寫字速度的地方！調成 60 毫秒，優雅又不會太久喔
                        setTimeout(writeNextCell, 60); 
                    } else {
                        progressBar.style.width = '100%';
                        if (document.getElementById('splash-progress-text')) {
                            document.getElementById('splash-progress-text').textContent = '100%';
                        }
                        
                        setTimeout(() => {
                            splashScreen.style.opacity = '0';
                            setTimeout(() => {
                                splashScreen.style.display = 'none';
                                if (loginScreen) loginScreen.classList.remove('hidden');
                            }, 500);
                        }, 500);
                    }
                }
                // ✨ 棋盤出來後，稍微等一下下再開始寫字
                setTimeout(writeNextCell, 600);
            }
        });
</script>

  </body>
</html>
